<!-- Zero To Sixty System Architecture Diagram -->
<!-- Created with: https://app.diagrams.net (draw.io) -->
<!-- Can be opened and edited in VS Code with extension, or exported as PNG -->

<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="1200" viewBox="0 0 1000 1200">
  <!-- Title -->
  <text x="500" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">Zero To Sixty - System Architecture</text>
  
  <!-- User Input Box -->
  <rect x="350" y="60" width="300" height="60" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="5"/>
  <text x="500" y="95" font-size="16" font-weight="bold" text-anchor="middle" fill="white">👤 User Input: Python Code</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="120" x2="500" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Input Handler Box -->
  <rect x="350" y="160" width="300" height="60" fill="#2196F3" stroke="#1565C0" stroke-width="2" rx="5"/>
  <text x="500" y="195" font-size="16" font-weight="bold" text-anchor="middle" fill="white">📥 Input Handler</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="220" x2="500" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Static Analysis Layer (Main Box) -->
  <rect x="250" y="260" width="500" height="200" fill="#FFF3E0" stroke="#E65100" stroke-width="3" rx="5" stroke-dasharray="5,5"/>
  
  <!-- Static Analysis Title -->
  <text x="500" y="285" font-size="16" font-weight="bold" text-anchor="middle" fill="#E65100">📊 Static Analysis Layer (Local, No AI)</text>
  
  <!-- Sub-components -->
  <rect x="270" y="300" width="140" height="80" fill="#FFE0B2" stroke="#FF6F00" stroke-width="2" rx="3"/>
  <text x="340" y="325" font-size="12" font-weight="bold" text-anchor="middle">AST Parser</text>
  <text x="340" y="345" font-size="11" text-anchor="middle">• Syntax Check</text>
  <text x="340" y="360" font-size="11" text-anchor="middle">• Structure Extract</text>
  
  <rect x="430" y="300" width="140" height="80" fill="#FFE0B2" stroke="#FF6F00" stroke-width="2" rx="3"/>
  <text x="500" y="325" font-size="12" font-weight="bold" text-anchor="middle">Complexity Calc</text>
  <text x="500" y="345" font-size="11" text-anchor="middle">• Cyclomatic</text>
  <text x="500" y="360" font-size="11" text-anchor="middle">• Code Metrics</text>
  
  <rect x="590" y="300" width="140" height="80" fill="#FFE0B2" stroke="#FF6F00" stroke-width="2" rx="3"/>
  <text x="660" y="325" font-size="12" font-weight="bold" text-anchor="middle">Pattern Detection</text>
  <text x="660" y="345" font-size="11" text-anchor="middle">• Mutable Args</text>
  <text x="660" y="360" font-size="11" text-anchor="middle">• Bare Except</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="460" x2="500" y2="510" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Gemini AI Agent Box -->
  <rect x="300" y="510" width="400" height="110" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3" rx="5"/>
  <text x="500" y="535" font-size="16" font-weight="bold" text-anchor="middle" fill="#1B5E20">🤖 Gemini AI Agent</text>
  <text x="500" y="560" font-size="12" text-anchor="middle" fill="#2E7D32">Model: gemini-pro</text>
  <text x="500" y="580" font-size="11" text-anchor="middle" fill="#333">Analyzes: Code + Static Results → Bugs, Inefficiencies, Security, Improvements</text>
  <text x="500" y="600" font-size="11" text-anchor="middle" fill="#333">(Response Time: 1-3 seconds)</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="620" x2="500" y2="660" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Report Generation Box -->
  <rect x="250" y="660" width="500" height="120" fill="#FCE4EC" stroke="#C2185B" stroke-width="3" rx="5"/>
  <text x="500" y="685" font-size="16" font-weight="bold" text-anchor="middle" fill="#880E4F">📋 Report Generation</text>
  
  <rect x="270" y="700" width="140" height="60" fill="#F8BBD0" stroke="#E91E63" stroke-width="2" rx="3"/>
  <text x="340" y="720" font-size="12" font-weight="bold" text-anchor="middle">Bugs Found</text>
  <text x="340" y="738" font-size="10" text-anchor="middle">with severity &amp;</text>
  <text x="340" y="753" font-size="10" text-anchor="middle">fixes</text>
  
  <rect x="430" y="700" width="140" height="60" fill="#F8BBD0" stroke="#E91E63" stroke-width="2" rx="3"/>
  <text x="500" y="720" font-size="12" font-weight="bold" text-anchor="middle">Inefficiencies</text>
  <text x="500" y="738" font-size="10" text-anchor="middle">&amp; Optimization</text>
  <text x="500" y="753" font-size="10" text-anchor="middle">Suggestions</text>
  
  <rect x="590" y="700" width="140" height="60" fill="#F8BBD0" stroke="#E91E63" stroke-width="2" rx="3"/>
  <text x="660" y="720" font-size="12" font-weight="bold" text-anchor="middle">Security Issues</text>
  <text x="660" y="738" font-size="10" text-anchor="middle">&amp; Risk</text>
  <text x="660" y="753" font-size="10" text-anchor="middle">Mitigation</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="780" x2="500" y2="820" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Output Options -->
  <rect x="200" y="820" width="600" height="100" fill="#F3E5F5" stroke="#512DA8" stroke-width="2" rx="5"/>
  <text x="500" y="845" font-size="14" font-weight="bold" text-anchor="middle" fill="#512DA8">💾 Output Options</text>
  
  <rect x="220" y="860" width="120" height="40" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1" rx="3"/>
  <text x="280" y="887" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Console Output</text>
  
  <rect x="360" y="860" width="120" height="40" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1" rx="3"/>
  <text x="420" y="887" font-size="11" font-weight="bold" text-anchor="middle" fill="white">JSON Export</text>
  
  <rect x="500" y="860" width="120" height="40" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1" rx="3"/>
  <text x="560" y="887" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Markdown Report</text>
  
  <rect x="640" y="860" width="140" height="40" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1" rx="3"/>
  <text x="710" y="887" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Google Docs (Bonus)</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="900" x2="500" y2="940" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Bonus Features Box -->
  <rect x="200" y="940" width="600" height="150" fill="#F1F8E9" stroke="#558B2F" stroke-width="2" rx="5"/>
  <text x="500" y="965" font-size="14" font-weight="bold" text-anchor="middle" fill="#33691E">🎁 Bonus Features</text>
  
  <rect x="220" y="980" width="260" height="100" fill="#C5E1A5" stroke="#9CCC65" stroke-width="1" rx="3"/>
  <text x="350" y="1005" font-size="12" font-weight="bold" text-anchor="middle" fill="#33691E">Automated Documentation</text>
  <text x="350" y="1025" font-size="10" text-anchor="middle">Google-style Docstrings</text>
  <text x="350" y="1040" font-size="10" text-anchor="middle">Parameters, Returns, Examples</text>
  <text x="350" y="1055" font-size="10" text-anchor="middle">Saves as Markdown</text>
  
  <rect x="500" y="980" width="280" height="100" fill="#C5E1A5" stroke="#9CCC65" stroke-width="1" rx="3"/>
  <text x="640" y="1005" font-size="12" font-weight="bold" text-anchor="middle" fill="#33691E">Team Integration</text>
  <text x="640" y="1025" font-size="10" text-anchor="middle">Export to Google Docs</text>
  <text x="640" y="1040" font-size="10" text-anchor="middle">CI/CD Integration (JSON)</text>
  <text x="640" y="1055" font-size="10" text-anchor="middle">Share with Team Members</text>
  
  <!-- Legend -->
  <rect x="50" y="1100" width="900" height="80" fill="#FFFDE7" stroke="#F57F17" stroke-width="1" rx="3"/>
  <text x="60" y="1120" font-size="12" font-weight="bold" fill="#333">📌 Data Flow:</text>
  <text x="60" y="1138" font-size="11" fill="#333">1. User provides code → 2. Input validation → 3. Static analysis (local, fast) → 4. Sent to Gemini API with context → 5. AI provides structured feedback → 6. Formatted output (console/JSON/Markdown/Google Docs)</text>
  <text x="60" y="1156" font-size="11" fill="#333">⚡ Performance: Static analysis (~3ms) + AI review (~1-3s) = Total ~3-5 seconds for typical code</text>
  <text x="60" y="1174" font-size="11" fill="#333">🔒 Security: Code sent to Google Gemini API. For sensitive code, run static analysis only (no AI).</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#333"/>
    </marker>
  </defs>
</svg>
